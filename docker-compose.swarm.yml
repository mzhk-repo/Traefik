services:
  traefik:
    container_name: !reset null
    restart: !reset null
    pull_policy: !reset null
    entrypoint:
      - /bin/sh
      - -ec
      - |
        while IFS= read -r $$line || [ -n "$$line" ]; do
          case "$$line" in
            ""|\#*) continue ;;
          esac
          export "$$line"
        done < /run/secrets/app_env_payload
        exec /entrypoint.sh "$$@"
      - --
    env_file: !reset []
    environment: []
    secrets:
      - source: app_env_payload
        target: app_env_payload
    ports: !override
      - target: 80
        published: ${TRAEFIK_ENTRYPOINT_PORT:-8080}
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 2m
      placement:
        constraints:
          - node.labels.app_zone == manager

secrets:
  app_env_payload:
    external: true
    name: ${TRAEFIK_APP_ENV_PAYLOAD_SECRET_NAME}
